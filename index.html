<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Material Suplementario - Riesgo LAFT</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            background-color: #f8f9fa;
        }
        .header {
            background-color: #2c3e50;
            color: white;
            padding: 15px;
            text-align: center;
        }
        .nav-buttons {
            display: flex;
            justify-content: center;
            gap: 10px;
            padding: 15px;
            background-color: #e9ecef;
        }
        button {
            padding: 10px 20px;
            font-size: 14px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            background-color: #3498db;
            color: white;
            transition: background 0.3s;
        }
        button:hover {
            background-color: #2980b9;
        }
        .pdf-container {
            flex-grow: 1;
            width: 100%;
            border: none;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <div class="header">
        <h2>Material Suplementario: Modelación Bayesiana Espacial</h2>
    </div>

    <div class="nav-buttons">
        <button onclick="cambiarPDF('anexos_referencias.pdf')">Anexos y Referencias Bibliográficas (MCMC)</button>
        <button onclick="window.open('https://github.com/MiguelHdz26/bayesiana-laft/releases/download/v1.0/bayes_casoestudio_main.pdf', '_blank')">Documento Completo</button>
        <button onclick="cambiarPDF('poster_english.pdf')">English Poster Version</button>
    </div>

    <div class="pdf-container">
        <iframe id="visor" src="anexos_condicionales.pdf"></iframe>
    </div>

    <script>
        // Esta función cambia el PDF del visor cuando haces clic en un botón
        function cambiarPDF(archivo) {
            document.getElementById('visor').src = archivo;
        }
    </script>

</body>
</html>
